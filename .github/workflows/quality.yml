name: Quality

on:
  push:
  pull_request:

jobs:
  javascript:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [mcp-server, web-ui]
    defaults:
      run:
        working-directory: ${{ matrix.project }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r embeddings-service/requirements.txt -r graph-service/requirements.txt pytest
      - name: Run embeddings tests
        run: pytest -q embeddings-service/tests
      - name: Compile python services
        run: python -m compileall embeddings-service/app graph-service/app
